<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 500">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#1A56DB" stop-opacity="0.4" />
    </linearGradient>
  </defs>

  <g filter="url(#glow)">
    <circle cx="100" cy="50" r="22" fill="url(#bodyGrad)" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4 2"/>
    <circle cx="100" cy="50" r="12" fill="none" stroke="#1A56DB" stroke-width="1" opacity="0.5"/>
    
    <line x1="100" y1="72" x2="100" y2="85" stroke="#22d3ee" stroke-width="2" />

    <path d="M 65 95 C 65 95, 135 95, 135 95 C 145 150, 130 220, 120 250 C 100 265, 100 265, 80 250 C 70 220, 55 150, 65 95 Z" fill="url(#bodyGrad)" stroke="#22d3ee" stroke-width="1.5" />
    
    <line x1="100" y1="95" x2="100" y2="255" stroke="#22d3ee" stroke-width="1" stroke-dasharray="2 4" opacity="0.7"/>
    <line x1="62" y1="130" x2="138" y2="130" stroke="#22d3ee" stroke-width="1" stroke-dasharray="2 4" opacity="0.5"/>
    <line x1="68" y1="180" x2="132" y2="180" stroke="#22d3ee" stroke-width="1" stroke-dasharray="2 4" opacity="0.5"/>
    <line x1="75" y1="220" x2="125" y2="220" stroke="#22d3ee" stroke-width="1" stroke-dasharray="2 4" opacity="0.5"/>

    <path d="M 65 100 C 30 110, 20 180, 15 240" fill="none" stroke="#22d3ee" stroke-width="1.5" />
    <path d="M 135 100 C 170 110, 180 180, 185 240" fill="none" stroke="#22d3ee" stroke-width="1.5" />
    
    <circle cx="33" cy="155" r="3" fill="#22d3ee" />
    <circle cx="167" cy="155" r="3" fill="#22d3ee" />

    <path d="M 85 255 C 80 330, 70 410, 60 480" fill="none" stroke="#22d3ee" stroke-width="1.5" />
    <path d="M 115 255 C 120 330, 130 410, 140 480" fill="none" stroke="#22d3ee" stroke-width="1.5" />
    
    <circle cx="76" cy="350" r="3" fill="#22d3ee" />
    <circle cx="124" cy="350" r="3" fill="#22d3ee" />
    
    <circle cx="110" cy="120" r="4" fill="#00C897">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
